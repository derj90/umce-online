name: Deploy to VPS

on:
  push:
    branches: [main]

concurrency:
  group: deploy-umce-online
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 82.29.61.165
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: /opt/deploy-umce-online.sh

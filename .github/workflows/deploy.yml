name: CI/CD Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  ci:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm test

  deploy:
    name: Deploy to VPS
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: /opt/deploy-umce-online.sh

  healthcheck:
    name: Healthcheck
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deploy to propagate
        run: sleep 30

      - name: Check umce.online
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://umce.online)
          if [ "$STATUS" -ne 200 ]; then
            echo "::error::Healthcheck failed — https://umce.online returned HTTP $STATUS"
            exit 1
          fi
          echo "Healthcheck passed — HTTP $STATUS"

      - name: Check piac.umce.online
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://piac.umce.online)
          if [ "$STATUS" -ne 200 ]; then
            echo "::warning::piac.umce.online returned HTTP $STATUS"
          fi
          echo "piac.umce.online — HTTP $STATUS"
